<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sin conexión — CitasXdev</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#9f7ec2">
  <link rel="icon" type="image/png" href="/oficial/citasxdev.png">
  <style>
    :root {
      --bg: #0c0b0e;
      --surface: #1a181c;
      --accent: #9f7ec2;
      --accent-2: #b185db;
      --text: #e0d2f2;
      --text-muted: #b6a3cc;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 360px;
      width: 100%;
      background: var(--surface);
      border: 1px solid #2e2a32;
      border-radius: 24px;
      padding: 40px 24px;
      box-shadow: 0 10px 24px rgba(0,0,0,.6);
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-2);
      margin-bottom: 12px;
    }
    p {
      color: var(--text-muted);
      font-size: .95rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #6d3f9c;
      color: #fff;
      border: none;
      border-radius: 60px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: background .15s;
      text-decoration: none;
    }
    .btn:hover { background: #8256b0; }
    .status {
      margin-top: 20px;
      font-size: .8rem;
      color: #7e6f96;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      margin: 0 auto 20px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/oficial/citasxdev.png" alt="CitasXdev" class="logo">
    <span class="icon" aria-hidden="true">📡</span>
    <h1>Sin conexión a internet</h1>
    <p>Parece que no tienes conexión en este momento. Verifica tu red y vuelve a intentarlo.</p>
    <button class="btn" onclick="window.location.reload()">
      ↻ Reintentar
    </button>
    <p class="status" id="status-msg">Esperando conexión...</p>
  </div>

  <script>
    /* Detectar cuando vuelve la conexión */
    window.addEventListener('online', () => {
      document.getElementById('status-msg').textContent = '¡Conexión restaurada! Redirigiendo...';
      setTimeout(() => { window.location.href = '/oficial/'; }, 1000);
    });

    window.addEventListener('offline', () => {
      document.getElementById('status-msg').textContent = 'Sin conexión a internet.';
    });

    /* Verificar estado inicial */
    if (navigator.onLine) {
      window.location.href = '/oficial/';
    }
  </script>
</body>
</html>
